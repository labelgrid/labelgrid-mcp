name: Publish

# Publishes to npm via trusted publishing (GitHub OIDC + provenance) when a
# GitHub Release is published. No long-lived npm token is stored — the registry
# verifies the workflow's OIDC identity.
#
# Multi-package: the workspace publishes @labelgrid/core, @labelgrid/mcp and
# @labelgrid/cli from this one workflow. Each package's publish is guarded by
# a version-already-on-registry check (so re-running a release never double-
# publishes), and the steps run strictly in dependency order — core first,
# then the packages that depend on it (mcp, cli). Every publish step is
# `continue-on-error: false`: if the core publish fails, nothing that depends
# on it is published.
#
# REQUIRED SETUP: each package's npm "trusted publisher" must be configured
# (npmjs.com → the package → Settings → Trusted publishers) for this repo and
# this workflow file BEFORE its first release from here. @labelgrid/mcp is
# configured; @labelgrid/core and @labelgrid/cli must be added before their
# first release, or their publish steps will fail the OIDC exchange.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: build, verify & publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      # NOTE: no registry-url here — setup-node's registry-url writes an .npmrc
      # with a placeholder token, which makes npm skip the OIDC trusted-publishing
      # exchange. Trusted publishing needs npm to find NO configured credentials.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Repository hygiene scan
        run: npm run leak-guard
      - name: Update npm for trusted publishing
        run: npm install -g npm@11.18.0 && npm --version

      # ---- @labelgrid/core (published first — mcp and cli depend on it) ----
      - name: Skip if @labelgrid/core is already on the registry
        id: check_core
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          if npm view "@labelgrid/core@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "@labelgrid/core@$VERSION already published — skipping."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish @labelgrid/core to npm (provenance)
        if: steps.check_core.outputs.published == 'false'
        continue-on-error: false
        run: npm publish -w @labelgrid/core --provenance --access public

      # ---- @labelgrid/mcp ----
      - name: Skip if @labelgrid/mcp is already on the registry
        id: check
        run: |
          VERSION=$(node -p "require('./packages/mcp/package.json').version")
          if npm view "@labelgrid/mcp@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "@labelgrid/mcp@$VERSION already published — skipping."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      # Fail closed rather than publish a server whose @labelgrid/core
      # dependency cannot be installed from the registry (e.g. the core publish
      # above was skipped against a version that never shipped).
      - name: Preflight — the @labelgrid/core dependency must be on the registry
        if: steps.check.outputs.published == 'false'
        run: |
          CORE_VERSION=$(node -p "require('./packages/mcp/package.json').dependencies['@labelgrid/core']")
          # A lockstep release publishes core earlier in THIS run; the registry
          # read path can lag the publish by up to a minute, so retry before
          # failing closed.
          for i in 1 2 3 4 5 6; do
            if npm view "@labelgrid/core@$CORE_VERSION" version >/dev/null 2>&1; then
              exit 0
            fi
            echo "@labelgrid/core@$CORE_VERSION not visible yet (attempt $i) — waiting..."
            sleep 15
          done
          echo "@labelgrid/core@$CORE_VERSION is not on the registry — publish it first." >&2
          exit 1
      - name: Publish @labelgrid/mcp to npm (provenance)
        if: steps.check.outputs.published == 'false'
        continue-on-error: false
        run: npm publish -w @labelgrid/mcp --provenance --access public

      # ---- @labelgrid/cli (after core — it depends on it) ----
      - name: Skip if @labelgrid/cli is already on the registry
        id: check_cli
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          if npm view "@labelgrid/cli@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "@labelgrid/cli@$VERSION already published — skipping."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      # Same fail-closed preflight for the CLI's @labelgrid/core dependency.
      - name: Preflight — the CLI's @labelgrid/core dependency must be on the registry
        if: steps.check_cli.outputs.published == 'false'
        run: |
          CORE_VERSION=$(node -p "require('./packages/cli/package.json').dependencies['@labelgrid/core']")
          # Same lockstep-lag retry as the server preflight above.
          for i in 1 2 3 4 5 6; do
            if npm view "@labelgrid/core@$CORE_VERSION" version >/dev/null 2>&1; then
              exit 0
            fi
            echo "@labelgrid/core@$CORE_VERSION not visible yet (attempt $i) — waiting..."
            sleep 15
          done
          echo "@labelgrid/core@$CORE_VERSION is not on the registry — publish it first." >&2
          exit 1
      - name: Publish @labelgrid/cli to npm (provenance)
        if: steps.check_cli.outputs.published == 'false'
        continue-on-error: false
        run: npm publish -w @labelgrid/cli --provenance --access public

  # Separate job so its contents:write scope never mixes with the publish job's
  # id-token:write (trusted publishing). Builds the Claude Desktop one-click
  # bundle and attaches it to the same GitHub Release. Release events only —
  # there is no release to upload to on workflow_dispatch.
  bundle:
    name: build & attach Claude Desktop bundle
    needs: publish
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Build the MCPB bundle
        run: npm run build:mcpb
      - name: Attach the bundle to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" labelgrid.mcpb --clobber
